<!DOCTYPE html>
<html>
<head>
    <title>Complete CI/CD Pipeline Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
        }

        .pipeline {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 50px;
            flex-wrap: wrap;
        }

        .stage {
            background: #1e293b;
            padding: 20px;
            margin: 10px;
            border-radius: 12px;
            width: 180px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            position: relative;
        }

        .arrow {
            font-size: 30px;
            margin: 0 10px;
        }

        /* Color coding for stages */
        .github { color: #60a5fa; }
        .ci { color: #facc15; }
        .docker { color: #38bdf8; }
        .yq { color: #f87171; }
        .argo { color: #f472b6; }
        .k8s { color: #818cf8; }

        .status {
            margin-top: 10px;
            font-size: 14px;
            color: #22c55e;
        }
    </style>
</head>
<body>

    <h1>🚀 CI/CD Pipeline Dashboard</h1>
    <h3>GitHub Actions → Docker → yq → Git → Argo CD → Kubernetes</h3>

    <div class="pipeline">
        {% for stage in pipeline %}
            <div class="stage {{ stage.color }}">
                <h3>{{ stage.name }}</h3>
                <p>{{ stage.desc }}</p>
                <div class="status">{{ stage.status }}</div>
            </div>
            {% if not loop.last %}
                <div class="arrow">➡️</div>
            {% endif %}
        {% endfor %}
    </div>

</body>
</html>
