name: CICD pipeline for Flask app
on:
  push:
    branches: [ main ]

jobs:
  flask-ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    
    - name: Get recent push SHA
      run: echo "GITHUB_SHA=${GITHUB_SHA::5}" >> $GITHUB_ENV

    - name: Docker Hub Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Confirm Docker Login
      run: echo "Docker login successful"

    - name: Build  Docker Image
      run: |
        docker build -t bibekk477/gha-argocd-k8s-pipeline:${{ env.GITHUB_SHA }} .
        echo "Docker image built successfully"


    - name: Push Docker Image
      run: |
        docker push bibekk477/gha-argocd-k8s-pipeline:${{ env.SHORT_SHA }}
        echo "Docker image pushed successfully"