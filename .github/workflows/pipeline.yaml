name: CICD pipeline for Flask app
on:
  push:
    branches: [ main ]

jobs:
  flask-ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    
    - name: Get recent push SHA
      run: echo "GITHUB_SHA=${GITHUB_SHA::5}" >> $GITHUB_ENV

    - name: Build & Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true 
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        tags: bibekk477/gha-argocd-k8s-pipeline:${{ env.GITHUB_SHA }}