name: CICD pipeline for Flask app
on:
  push:
    branches: [ main ]

jobs:
  flask-ci:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Clone the repository to access source code
    - name: Checkout code
      uses: actions/checkout@v2
    
    # Step 2: Extract the first 5 characters of the commit SHA for image tagging
    - name: Get recent push SHA
      run: echo "SHORT_SHA=${GITHUB_SHA::5}" >> $GITHUB_ENV

    # Step 3: Authenticate with Docker Hub using stored credentials
    - name: Docker Hub Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Step 4: Verify that Docker Hub authentication was successful
    - name: Confirm Docker Login
      run: echo "Docker login successful"

    # Step 5: Build the Docker image and tag it with the shortened commit SHA
    - name: Build  Docker Image
      run: |
        docker build -t bibekk477/gha-argocd-k8s-pipeline:${{ env.SHORT_SHA }} .
        echo "Docker image built successfully"


    # Step 6: Push the built Docker image to Docker Hub repository
    - name: Push Docker Image
      run: |
        docker push bibekk477/gha-argocd-k8s-pipeline:${{ env.SHORT_SHA }}
        echo "Docker image pushed successfully"

    # Step 7: Install yq for YAML manipulation in subsequent steps(update k8s deployment manifests)
    - name: Install yq
      run: |
        sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
        sudo chmod +x /usr/bin/yq
        yq --version
    # Step 8: Update the Kubernetes deployment manifest with the new image tag using yq
    - name: Update Kubernetes Deployment Manifest
      run: |
        yq e -i '.spec.template.spec.containers[0].image = "bibekk477/gha-argocd-k8s-pipeline:${{ env.SHORT_SHA }}"' ./k8s/deployment.yaml
        echo "Kubernetes deployment manifest updated with new image tag ${{ env.SHORT_SHA }}"      

    # Step 9: Commit the updated deployment manifest back to the repository
    - name: Commit and Push Updated Deployment Manifest
      run: |
        # Sets the Git author name for any commits made in the workflow.
        git config --global user.name "GitHub-Actions[bot]"
        # Sets the Git author email for commits.
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add ./k8s/deployment.yaml
        git commit -m "Update deployment manifest with new image tag ${{ env.SHORT_SHA }} by GitHub Actions"
        git push origin main
