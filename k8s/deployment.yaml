apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-deployment
  namespace: pyapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: flaskapp
          image: bibekk477/gha-argocd-k8s-pipeline:latest
          ports:
            - containerPort: 8000
