apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-flaskapp-deployment
  namespace: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: flaskapp
          image: bibekk477/gha-argocd-k8s-pipeline:d77de
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
      imagePullSecrets:
        - name: image-pull-secret
